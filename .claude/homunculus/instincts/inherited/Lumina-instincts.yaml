# Lumina Workflow Add New Database Field And Pipeline

## Action

Follow the add-new-database-field-and-pipeline workflow:
1. Add new columns to database schema (SQL migrations for MySQL and SQLite).
2. Add fields to entity classes and DTOs.
3. Update mappers (Java and XML) to handle new fields.
4. Update service and accumulator logic to process new fields.
5. Expose new fields in API responses.
6. Update frontend types and services to consume new fields.
7. Display new metrics in the frontend UI.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/main/resources/db/migration/*.sql, src/main/java/com/lumina/entity/*.java, src/main/java/com/lumina/dto/*.java

