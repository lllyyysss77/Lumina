spring:
  application:
    name: lumina

  profiles:
    active: dev

  # 数据库配置 (支持 MySQL 和 SQLite)
  # 使用 MySQL: 设置 SPRING_DATASOURCE_URL=jdbc:mysql://...
  # 使用 SQLite: 设置 SPRING_DATASOURCE_URL=jdbc:sqlite:./data/lumina.db
  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lumina?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: DateSourceHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL

  # HTTP Codec 配置
  http:
    codecs:
      max-in-memory-size: 100MB

  # MVC 配置
  mvc:
    async:
      request-timeout: 600000 # 10分钟

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:redis123}
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 0
      max-file-size: 10MB
      max-request-size: 10MB

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    min-spare-threads: 10
    accept-count: 100
    max-connections: 8192
  max-http-request-header-size: 8192

# MyBatis Plus配置
mybatis-plus:
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.lumina.entity
  # mapper xml文件扫描路径
  mapper-locations: classpath*:mapper/*.xml
  # 以下配置均有默认值,可以不设置
  global-config:
    # 数据库相关配置
    db-config:
      # 主键类型  AUTO:"数据库ID自增" INPUT:"用户输入ID" ASSIGN_ID:"全局唯一ID (数字类型唯一ID)" ASSIGN_UUID:"全局唯一ID UUID"
      id-type: AUTO
      # 字段验证策略
      field-strategy: NOT_EMPTY
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  # 原生配置
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存配置
    cache-enabled: true
    # 延迟加载
    lazy-loading-enabled: true
    # 积极延迟加载
    aggressive-lazy-loading: false

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
      base-path: /api/v1/actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  prometheus:
    metrics:
      export:
        enabled: true

# 日志配置
logging:
  level:
    com.lumina: info
    org.springframework.web: info
    org.springframework.security: info
    com.baomidou.mybatisplus: info
    reactor.netty.http.client: WARN
    io.netty: WARN
    org.apache.catalina: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/lumina.log
    max-size: 100MB
    max-history: 30

# Lumina 特定配置
lumina:
  stats:
    log-keep-days: 0        # 0 = 永不删除日志行
    content-keep-days: 3    # 请求/响应内容保留3天后置NULL
  # CORS 配置
  # 默认无跨域白名单（前端同源部署）。如需跨域访问，设置环境变量 LUMINA_ALLOWED_ORIGINS，
  # 例如：LUMINA_ALLOWED_ORIGINS=https://admin.example.com,https://api.example.com
  # 安全说明：allowed-origins=* 与 allow-credentials=true 不能同时配置，否则启动失败。
  cors:
    allowed-origins: ${LUMINA_ALLOWED_ORIGINS:}
    allow-credentials: ${LUMINA_CORS_ALLOW_CREDENTIALS:true}

  # 熔断器配置
  circuit-breaker:
    # 触发条件
    min-calls: 20                        # 最小请求数
    error-rate-threshold: 0.5            # 错误率阈值
    consecutive-failure-threshold: 5     # 连续失败阈值

    # 慢调用配置 (Phase 2)
    slow-call-threshold-ms: 4000         # 慢调用阈值 (4秒)
    slow-rate-threshold: 0.6             # 慢调用率阈值

    # 探测配置 (HALF_OPEN)
    permitted-calls-in-half-open: 2      # 允许的探测请求数
    half-open-success-threshold: 2       # 成功阈值
    half-open-failure-threshold: 1       # 失败阈值
    half-open-max-duration-ms: 30000     # HALF_OPEN 超时时间 (30秒)

    # 退避配置
    open-base-ms: 5000                   # 基础退避时间 (5秒)
    open-max-ms: 300000                  # 最大退避时间 (5分钟)
    backoff-multiplier: 2.0              # 退避乘数
    jitter-ratio: 0.2                    # 抖动比例

    # Failover 配置
    max-failover-attempts: 3             # 最大 Failover 次数

    # Bulkhead 配置 (Phase 2)
    max-concurrent-requests-per-provider: 50  # 每 Provider 最大并发数

    # 滑动窗口配置 (Phase 2)
    window-bucket-count: 10              # 桶数量
    window-bucket-duration-ms: 1000      # 每桶时间跨度 (1秒)

  # 认证配置
  auth:
    jwt:
      # JWT 签名密钥（HS512）。本地开发 / 单机部署可以直接写在这里；
      # 生产部署建议替换成你自己的 48+ 字节高熵随机串（例如 openssl rand -base64 48 生成）。
      # 如果希望通过环境变量覆盖，仍然可以设置 LUMINA_JWT_SECRET，它优先级高于下面的默认值。
      secret: ${LUMINA_JWT_SECRET:3NP8Z94Mfi0DDj50kqpWaWmFNepu/8xP8SOvKwZWo1Ga60IZhTD0onf5q/pHF1VB}
      expiration: 86400000  # 24小时，毫秒
      refresh-expiration: 604800000  # 7天，毫秒

  # API配置
  api:
    version: v1
    prefix: /api/v1

  # 日志链路配置
  logging:
    queue-capacity: 5000
    batch-size: 100
    flush-interval-ms: 500
    success-payload-sample-rate: 1.0
